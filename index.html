<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- Cache busting — never cache so deploys appear instantly. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Yassen Elkhatib — Choose Your Experience</title>
<meta name="description" content="Yassen Elkhatib's video editor portfolio — pick the full 3D experience, the English portfolio, or the Arabic portfolio.">
<meta name="theme-color" content="#0a0710">
<link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32">
<link rel="icon" type="image/png" href="/favicon-64.png" sizes="64x64">

<!-- Fonts: retro for English, naskh for Arabic. Files served from /assets/. -->
<style>
  @font-face {
    font-family: 'Berkshire Pro Loops';
    src: url('/assets/fonts/berkshire-pro-loops.otf') format('opentype'),
         url('/assets/fonts/berkshire-pro-loops.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'Panorama Naskh';
    src: url('/assets/fonts/NTPanoramaNaskh-Regular.otf') format('opentype');
    font-display: swap;
  }
</style>

<style>
  /* RESPONSIVE PRINCIPLES applied here:
     - All sizes clamp(min, vw, max) — no fixed-px traps
     - Design baseline = 1536 viewport (assumes 125% Windows scaling, the default)
     - Grid auto-fits across widths
     - dvh used instead of vh for proper mobile address-bar handling
     - Mobile (<900px): 2 panels, no TV experience (3D too heavy for phones)
     - Desktop (≥900px): 3 panels, middle wider
     - Wide ultrawide screens: max-width container so panels don't stretch absurdly */

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; min-height: 100%; min-height: 100dvh;
    background: #0a0710;
    color: #e8dcc4;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  html { scrollbar-width: none; }
  html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* Film-grain backdrop — subtle, gives the cinematic feel */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(circle at 50% 30%, rgba(70,30,20,.25) 0%, transparent 60%),
      radial-gradient(circle at 20% 80%, rgba(40,15,40,.18) 0%, transparent 55%),
      radial-gradient(circle at 80% 70%, rgba(80,40,15,.15) 0%, transparent 50%);
  }

  .header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: clamp(16px, 3vh, 40px) clamp(16px, 3vw, 48px) clamp(8px, 1.5vh, 20px);
  }
  .brand {
    font-family: 'Berkshire Pro Loops', 'Fraunces', serif;
    font-size: clamp(22px, 3.5vw, 42px);
    color: #e8dcc4;
    letter-spacing: 0.02em;
  }
  .sub {
    font-size: clamp(10px, 1.1vw, 13px);
    letter-spacing: clamp(2px, 0.3vw, 4px);
    text-transform: uppercase;
    opacity: 0.55;
    margin-top: clamp(4px, 0.8vh, 10px);
  }

  .selector {
    position: relative;
    z-index: 2;
    display: grid;
    gap: clamp(12px, 1.6vw, 28px);
    padding: clamp(8px, 1.5vh, 24px) clamp(16px, 3vw, 48px) clamp(16px, 3vh, 40px);
    max-width: 1700px;
    margin: 0 auto;
    height: calc(100dvh - clamp(70px, 14vh, 140px));
    align-items: stretch;
  }
  /* DESKTOP — 3 panels, middle slightly wider */
  @media (min-width: 900px) {
    .selector {
      grid-template-columns: 1fr 1.45fr 1fr;
      grid-template-rows: 1fr;
    }
  }
  /* MOBILE / TABLET — 2 panels stacked, no TV experience */
  @media (max-width: 899px) {
    .selector {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
      gap: clamp(10px, 1.8vh, 18px);
    }
    .panel.middle { display: none; }
  }

  .panel {
    position: relative;
    display: flex;
    flex-direction: column;
    border-radius: clamp(12px, 1.4vw, 22px);
    background: rgba(232,220,196,.04);
    border: 1px solid rgba(232,220,196,.14);
    cursor: pointer;
    overflow: hidden;
    transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background .25s ease;
    text-decoration: none;
    color: inherit;
  }
  .panel:hover {
    transform: translateY(-3px);
    border-color: rgba(232,220,196,.42);
    box-shadow: 0 clamp(16px, 2vw, 28px) clamp(40px, 5vw, 60px) rgba(0,0,0,.55);
    background: rgba(232,220,196,.08);
  }
  .panel:active { transform: translateY(-1px) scale(.992); }

  /* Title bar at the top of each panel */
  .panel-title {
    padding: clamp(10px, 1.4vw, 20px) clamp(14px, 1.8vw, 26px) clamp(8px, 1vw, 16px);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(232,220,196,.10);
    background: linear-gradient(180deg, rgba(232,220,196,.05) 0%, transparent 100%);
  }
  .panel-title .t {
    font-family: 'Berkshire Pro Loops', 'Fraunces', serif;
    font-size: clamp(15px, 1.4vw, 24px);
    color: #e8dcc4;
    letter-spacing: 0.01em;
    line-height: 1.15;
  }
  .panel-title .arrow {
    font-size: clamp(14px, 1.2vw, 20px);
    opacity: .5;
    transition: transform .25s ease, opacity .25s ease;
  }
  .panel:hover .arrow { transform: translateX(4px); opacity: 1; }
  .panel.right .arrow { transform: scaleX(-1); }
  .panel.right:hover .arrow { transform: scaleX(-1) translateX(4px); }

  .panel.right .panel-title { flex-direction: row-reverse; }
  .panel.right .panel-title .t { font-family: 'Panorama Naskh', 'Cairo', sans-serif; direction: rtl; }

  /* Media area inside each panel — video or iframe preview */
  .media {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #050308;
  }
  .media video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Iframe preview for the portfolios — scaled down so the whole portfolio fits.
     Auto-scrolls via JS inside the portfolio when it detects ?preview=1 */
  .preview-wrap {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  .preview-iframe {
    position: absolute;
    top: 0; left: 0;
    width: 1280px;
    height: 800px;
    border: 0;
    transform: scale(0.32);
    transform-origin: top left;
    pointer-events: none;
    /* JS will adjust the scale to fit the panel after load */
  }

  /* "Loading…" placeholder before iframe finishes */
  .panel .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232,220,196,.4);
    font-size: clamp(11px, 1vw, 14px);
    letter-spacing: 2px;
    pointer-events: none;
    transition: opacity .4s ease;
  }
  .panel.loaded .loading { opacity: 0; }

  /* Footer */
  .footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 16px clamp(8px, 1.5vh, 18px);
    font-size: clamp(9px, 0.9vw, 11px);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.35;
  }
</style>
</head>
<body>

<header class="header">
  <div class="brand">Yassen Elkhatib</div>
  <div class="sub">Choose Your Experience</div>
</header>

<main class="selector">

  <!-- LEFT: English portfolio (smaller, on the left as Yassen requested) -->
  <a class="panel left" href="/test/EN-P.html" aria-label="Open English portfolio">
    <div class="panel-title">
      <span class="t">English Portfolio</span>
      <span class="arrow">→</span>
    </div>
    <div class="media">
      <div class="loading">loading preview…</div>
      <div class="preview-wrap">
        <iframe class="preview-iframe" data-src="/test/EN-P.html?preview=1" loading="lazy" title="English portfolio preview"></iframe>
      </div>
    </div>
  </a>

  <!-- MIDDLE: the 3D full experience (hidden on mobile) -->
  <a class="panel middle" href="/index-v5.html" aria-label="Open the full 3D experience">
    <div class="panel-title">
      <span class="t">The Full Experience</span>
      <span class="arrow">→</span>
    </div>
    <div class="media">
      <video autoplay muted loop playsinline preload="metadata" poster="/assets/room-env.jpg">
        <source src="/assets/video/cinematic.mp4" type="video/mp4">
      </video>
    </div>
  </a>

  <!-- RIGHT: Arabic portfolio (smaller, on the right) -->
  <a class="panel right" href="/test/index-h-1.html" aria-label="افتح أعمالي بالعربية">
    <div class="panel-title">
      <span class="t">أعمالي بالعربية</span>
      <span class="arrow">→</span>
    </div>
    <div class="media">
      <div class="loading">loading preview…</div>
      <div class="preview-wrap">
        <iframe class="preview-iframe" data-src="/test/index-h-1.html?preview=1" loading="lazy" title="معاينة الأعمال بالعربية"></iframe>
      </div>
    </div>
  </a>

</main>

<footer class="footer">
  Performance-driven video editor
</footer>

<script>
(function() {
  // Lazy-load the iframe previews ONLY when the panel is in view.
  // Saves bandwidth + RAM on first paint, especially on mobile.
  const iframes = document.querySelectorAll('.preview-iframe[data-src]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const ifr = e.target;
      ifr.src = ifr.dataset.src;
      ifr.removeAttribute('data-src');
      ifr.addEventListener('load', () => {
        const panel = ifr.closest('.panel');
        if (panel) panel.classList.add('loaded');
        // Fit the iframe content to the visible media area: compute scale based on
        // the actual rendered media size. iframe is rendered at 1280x800 internal —
        // we shrink it to fit width, capped so it doesn't get tiny on huge screens.
        _fitPreview(ifr);
      });
      observer.unobserve(ifr);
    });
  }, { threshold: 0.1 });
  iframes.forEach(i => observer.observe(i));

  function _fitPreview(iframe) {
    const wrap = iframe.parentElement;
    if (!wrap) return;
    const rect = wrap.getBoundingClientRect();
    if (rect.width === 0) return;
    const scale = rect.width / 1280;
    // Match iframe HEIGHT so the scaled content covers the panel's visible area
    iframe.style.transform = 'scale(' + scale.toFixed(4) + ')';
    iframe.style.height = (rect.height / scale) + 'px';
  }
  window.addEventListener('resize', () => {
    document.querySelectorAll('.preview-iframe').forEach(_fitPreview);
  });
  // Re-fit after a beat in case fonts/layout shifted
  setTimeout(() => {
    document.querySelectorAll('.preview-iframe').forEach(_fitPreview);
  }, 1500);

  // RAM measurement on selector page (light, since no 3D here)
  setTimeout(() => {
    if (performance.memory) {
      const heapMB = (performance.memory.usedJSHeapSize / 1048576).toFixed(0);
      console.log('[mem] Selector page heap: ' + heapMB + ' MB (light — no 3D loaded here)');
    }
  }, 2000);
})();
</script>

</body>
</html>
