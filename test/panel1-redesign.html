<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel 1 — redesign test (A / B)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;900&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
<style>
  @font-face{ font-family:'Panorama'; src:url('../assets/fonts/NTPanoramaNaskh-Regular.otf') format('opentype'); font-display:swap; }
  :root{
    --paper:#e7dcc2; --paper2:#ddd0b2; --ink:#1a1510; --ink-soft:#3a3026;
    --accent:#1f6f6b; --stamp:#9c3a2c; --line:rgba(26,21,16,.28);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{ scroll-behavior:smooth; }
  body{ background:var(--paper); color:var(--ink); font-family:'Amiri',serif; }
  /* paper grain */
  body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.10'/></svg>");
    mix-blend-mode:multiply; opacity:.5; }

  .panel{ position:relative; width:100vw; height:100vh; overflow:hidden; isolation:isolate;
          display:flex; align-items:center; justify-content:center;
          background:#d8cdb2 url('assets/poster-bg.jpg') center / cover no-repeat; }
  /* the double frame */
  .panel::before{ content:""; position:absolute; inset:18px; border:2px solid var(--ink);
    box-shadow:inset 0 0 0 1px var(--paper), inset 0 0 0 4px var(--ink); pointer-events:none; opacity:.85; z-index:5; }

  /* faint medallion backdrop */
  .medallion{ position:absolute; z-index:1; opacity:.22; mix-blend-mode:darken; pointer-events:none;
    width:min(640px,74vh); height:auto; }

  /* availability badge */
  .stamp{ position:absolute; top:46px; right:6vw; width:140px; height:140px; border-radius:50%;
    border:2px solid var(--paper); background:var(--stamp); color:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:2px;
    font-family:'Cairo',sans-serif; transform:rotate(-8deg); z-index:6;
    box-shadow:0 0 0 3px var(--stamp), 4px 5px 0 rgba(26,21,16,.28); }
  .stamp .dot{ width:8px; height:8px; border-radius:50%; background:var(--paper); opacity:.9; }
  .stamp b{ font-size:21px; font-weight:900; line-height:1.05; }
  .stamp small{ font-size:11px; opacity:.92; }

  /* the identity block */
  .hero{ position:relative; z-index:3; max-width:min(900px,90vw); }
  .hero-name{ display:flex; flex-wrap:wrap; gap:.28em; align-items:flex-end; }
  .hero-word{ font-family:'Panorama',serif; font-size:clamp(72px,9.5vw,156px); line-height:1.15; white-space:nowrap;
    font-feature-settings:"swsh" 1,"calt" 1,"dlig" 1,"liga" 1;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='1' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/><feComponentTransfer><feFuncR type='discrete' tableValues='0 0 0 0 0 0 0 1'/><feFuncG type='discrete' tableValues='0 0 0 0 0 0 0 1'/><feFuncB type='discrete' tableValues='0 0 0 0 0 0 0 1'/></feComponentTransfer></filter><rect width='100%25' height='100%25' filter='url(%23g)'/></svg>"), linear-gradient(var(--ink),var(--ink));
    background-size:150px 150px, 100% 100%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent; background-blend-mode:screen; }
  .hook{ font-style:italic; color:var(--ink); font-size:clamp(22px,2.6vw,32px); margin-top:.5em;
    max-width:24ch; border-top:1px solid var(--line); padding-top:.5em; }
  .roles{ font-family:'Cairo',sans-serif; font-size:clamp(14px,1.5vw,20px); letter-spacing:.04em;
    color:var(--ink-soft); margin-top:.9em; }
  .roles span{ white-space:nowrap; }

  /* OPTION B — centered */
  .b .medallion{ left:50%; top:50%; transform:translate(-50%,-50%); }
  .b .hero{ text-align:center; margin:auto; }
  .b .hero-name{ justify-content:center; }
  .b .hook{ margin-inline:auto; }

  /* OPTION A — right column */
  .a .hero{ text-align:right; margin-right:7vw; margin-left:auto; max-width:min(760px,58vw); }
  .a .hero-name{ justify-content:flex-start; }
  .a .hook{ margin-right:0; }
  .a .medallion{ left:18%; top:50%; transform:translate(-50%,-50%); opacity:.18; }

  .label{ position:absolute; bottom:26px; left:50%; transform:translateX(-50%); z-index:7;
    font-family:'Cairo',sans-serif; font-size:13px; letter-spacing:.1em; color:var(--paper);
    background:var(--ink); padding:6px 16px; border-radius:20px; opacity:.85; }
</style>
</head>
<body>

  <!-- ===================== OPTION B : centered hero ===================== -->
  <section class="panel b">
    <img class="medallion" src="/assets/baked/layer-3.jpg" alt="">
    <div class="stamp"><span class="dot"></span><b>متاح</b><small>للعمل الآن</small></div>
    <div class="hero">
      <h1 class="hero-name"><span class="hero-word">ياسين</span><span class="hero-word">الخطيب</span></h1>
      <p class="hook">أحوّل اللقطات الخام إلى قصة تُشاهَد.</p>
      <p class="roles"><span>محرر فيديو</span> · <span>مصمم موشن جرافيك</span> · <span>صانع واجهة مستخدم</span></p>
    </div>
    <div class="label">OPTION B — centered hero</div>
  </section>

  <!-- ===================== OPTION A : right column ===================== -->
  <section class="panel a">
    <img class="medallion" src="/assets/baked/layer-3.jpg" alt="">
    <div class="stamp"><span class="dot"></span><b>متاح</b><small>للعمل الآن</small></div>
    <div class="hero">
      <h1 class="hero-name"><span class="hero-word">ياسين</span><span class="hero-word">الخطيب</span></h1>
      <p class="hook">أحوّل اللقطات الخام إلى قصة تُشاهَد.</p>
      <p class="roles"><span>محرر فيديو</span> · <span>مصمم موشن جرافيك</span> · <span>صانع واجهة مستخدم</span></p>
    </div>
    <div class="label">OPTION A — right column</div>
  </section>

</body>
</html>
